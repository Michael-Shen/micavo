<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micavo</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #111827;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
    }

    h1 {
      font-size: 56px;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 22px;
      color: #6b7280;
      margin-bottom: 60px;
    }

    .products {
      text-align: left;
      margin-top: 40px;
    }

    .card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card h2 {
      margin: 0 0 10px 0;
    }

    .card p {
      color: #6b7280;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    footer {
      margin-top: 80px;
      color: #9ca3af;
      font-size: 14px;
    }

  </style>
</head>
<body>

<div class="container">

  <h1>Micavo</h1>

  <p class="subtitle">
    Building AI products that help people make better decisions.
  </p>

  <div class="products">

    <div class="card">
      <h2>EatOrNot</h2>
      <p>
        AI calorie coach powered by Apple Health.
      </p>
      <a href="/eatornot">
        Learn More →
      </a>
    </div>

    <div class="card">
      <h2>Critical Choice</h2>
      <p>
        Decision-making assistant.
      </p>
      <a href="/critical-choice">
        Learn More →
      </a>
    </div>

    <div class="card">
      <h2>Agent Marketplace</h2>
      <p>
        Coming soon.
      </p>
    </div>

  </div>

  <footer>
    © 2026 Micavo
  </footer>

</div>

</body>
</html>
